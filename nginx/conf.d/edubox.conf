# EduBox — Nginx reverse proxy + portail captif

upstream moodle      { server edubox-moodle:8080; }
upstream kolibri     { server edubox-kolibri:8080; }
upstream koha_opac   { server edubox-koha:8080; }
upstream koha_staff  { server edubox-koha:8081; }
upstream healthcheck { server edubox-healthcheck:8090; }
upstream kiwix       { server edubox-kiwix:8080; }

server {
    listen 80 default_server;
    server_name ofelia ofelia.local libofelia _;

    # ── Captive portal detection ──────────────────────────────────
    # Android — retourner 204 pour éviter le popup "pas d'internet"
    location = /generate_204   { return 204; }
    location = /gen_204        { return 204; }

    # iOS / macOS
    location = /hotspot-detect.html {
        return 200 '<HTML><HEAD><TITLE>Success</TITLE></HEAD><BODY>Success</BODY></HTML>';
        add_header Content-Type text/html;
    }
    location = /library/test/success.html {
        return 200 '<HTML><HEAD><TITLE>Success</TITLE></HEAD><BODY>Success</BODY></HTML>';
        add_header Content-Type text/html;
    }

    # Windows
    location = /connecttest.txt { return 302 http://edubox.local/; }
    location = /ncsi.txt {
        return 200 'Microsoft NCSI';
        add_header Content-Type text/plain;
    }
    location = /redirect {
        return 302 http://edubox.local/;
    }

    # ── Page d'accueil / portail ──────────────────────────────────
    location = / {
        root /var/www/edubox-portal;
        index index.html;
        try_files /index.html =404;
    }
    location /assets/ {
        root /var/www/edubox-portal;
        expires 7d;
    }

    # Status API (pour le portail)
    location = /api/status {
        proxy_pass http://healthcheck/api/status;
        proxy_read_timeout 5s;
    }

    # ── Moodle ───────────────────────────────────────────────────
    # Moodle wwwroot=http://localhost. On force Host:localhost pour que Moodle
    # reconstruise ses URLs en http://localhost/..., puis sub_filter les réécrit
    # en http://192.168.50.1/moodle/... pour le navigateur.
    location /moodle/ {
        proxy_pass http://moodle/;
        proxy_set_header Host localhost;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 300;
        client_max_body_size 200M;
        proxy_redirect http://localhost/ http://192.168.50.1/moodle/;
        sub_filter 'http:\/\/localhost' 'http:\/\/192.168.0.149\/moodle';
        sub_filter 'http://localhost' 'http://192.168.50.1/moodle';
        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript text/javascript application/json;
    }

    # ── Kolibri ──────────────────────────────────────────────────
    location /kolibri/ {
        proxy_pass http://kolibri/kolibri/;
        include /etc/nginx/proxy_params;
        proxy_buffering off;
    }

    # ── Koha OPAC (public) ───────────────────────────────────────
    location /biblio/ {
        proxy_pass http://koha_opac/;
        include /etc/nginx/proxy_params;
    }

    # ── Koha Staff (admin, réseau local seulement) ───────────────
    location /biblio-admin/ {
        proxy_pass http://koha_staff/;
        include /etc/nginx/proxy_params;
        allow 192.168.50.0/24;
        allow 192.168.0.0/24;
        allow 127.0.0.1;
        deny all;
    }

    # ── Koha Staff CGI sans préfixe (redirects internes de l'installeur) ────
    location /cgi-bin/koha/ {
        proxy_pass http://koha_staff/cgi-bin/koha/;
        include /etc/nginx/proxy_params;
        allow 192.168.50.0/24;
        allow 192.168.0.0/24;
        allow 127.0.0.1;
        deny all;
    }

    # ── Koha static assets (CSS/JS partagés OPAC+staff) ──────────
    # Les templates Koha génèrent des liens absolus /intranet-tmpl/ et /opac-tmpl/
    # sans préfixe /biblio-admin/ — nginx doit les proxifier vers le bon upstream
    location /intranet-tmpl/ {
        proxy_pass http://koha_staff/intranet-tmpl/;
        include /etc/nginx/proxy_params;
        allow 192.168.50.0/24;
        allow 192.168.0.0/24;
        allow 127.0.0.1;
        deny all;
        expires 1h;
    }

    location /opac-tmpl/ {
        proxy_pass http://koha_opac/opac-tmpl/;
        include /etc/nginx/proxy_params;
        expires 1h;
    }

    # ── Kiwix / Wikipedia ES ─────────────────────────────────────
    # Fix mobile: injecter CSS pour que l'iframe occupe tout l'écran (100dvh)
    location = /wiki/viewer {
        proxy_pass http://kiwix/wiki/viewer;
        include /etc/nginx/proxy_params;
        proxy_set_header Accept-Encoding "";
        sub_filter '</head>' '<style>#content_iframe{height:calc(100dvh - 50px)!important;}</style></head>';
        sub_filter_once on;
    }
    location /wiki/ {
        proxy_pass http://kiwix/wiki/;
        include /etc/nginx/proxy_params;
    }

    # ── Dashboard healthcheck ─────────────────────────────────────
    location /status/ {
        proxy_pass http://healthcheck/;
        include /etc/nginx/proxy_params;
    }
}

# ── Virtual hosts par sous-domaine ───────────────────────────────
server {
    listen 80;
    server_name moodle.edubox.local;
    location / {
        proxy_pass http://moodle/;
        include /etc/nginx/proxy_params;
        client_max_body_size 200M;
    }
}

server {
    listen 80;
    server_name kolibri.edubox.local;
    location / {
        proxy_pass http://kolibri/;
        include /etc/nginx/proxy_params;
        proxy_buffering off;
    }
}

server {
    listen 80;
    server_name biblio.edubox.local;
    location / {
        proxy_pass http://koha_opac/;
        include /etc/nginx/proxy_params;
    }
}
