# EduBox — Nginx reverse proxy + portail captif

upstream moodle      { server edubox-moodle:8080; }
upstream kolibri     { server edubox-kolibri:8080; }
upstream koha_opac   { server edubox-koha:8080; }
upstream koha_staff  { server edubox-koha:8081; }
upstream healthcheck { server edubox-healthcheck:8090; }
upstream kiwix       { server edubox-kiwix:8080; }
# Upstreams pour services optionnels — résolus dynamiquement via DNS Docker
# (évite l'erreur "host not found" si le container n'est pas encore démarré)
# resolver 127.0.0.11 = DNS interne Docker Compose

server {
    listen 80 default_server;
    server_name ofelia ofelia.local libofelia _;

    # ── Captive portal detection ──────────────────────────────────
    # Android — retourner 204 pour éviter le popup "pas d'internet"
    location = /generate_204   { return 204; }
    location = /gen_204        { return 204; }

    # iOS / macOS
    location = /hotspot-detect.html {
        return 200 '<HTML><HEAD><TITLE>Success</TITLE></HEAD><BODY>Success</BODY></HTML>';
        add_header Content-Type text/html;
    }
    location = /library/test/success.html {
        return 200 '<HTML><HEAD><TITLE>Success</TITLE></HEAD><BODY>Success</BODY></HTML>';
        add_header Content-Type text/html;
    }

    # Windows
    location = /connecttest.txt { return 302 http://edubox.local/; }
    location = /ncsi.txt {
        return 200 'Microsoft NCSI';
        add_header Content-Type text/plain;
    }
    location = /redirect {
        return 302 http://edubox.local/;
    }

    # ── Page d'accueil / portail ──────────────────────────────────
    location = / {
        root /var/www/edubox-portal;
        index index.html;
        try_files /index.html =404;
    }
    location /assets/ {
        root /var/www/edubox-portal;
        expires 7d;
    }
    location ~ ^/[^/]+\.html$ {
        root /var/www/edubox-portal;
        try_files $uri =404;
    }

    # Status API (pour le portail)
    location = /api/status {
        proxy_pass http://healthcheck/api/status;
        proxy_read_timeout 5s;
    }

    # Bouton "← Portail" injecté dans toutes les apps via sub_filter
    # Position fixe coin bas-gauche, z-index 9999, style sombre discret
    set $back_btn '<a id="ofelia-back" href="/" style="position:fixed;bottom:16px;left:16px;z-index:9999;background:#1e293b;color:#38bdf8;border:1px solid #334155;padding:7px 14px;border-radius:20px;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.5);opacity:.92;white-space:nowrap">&#8592; Portail</a></body>';

    # ── Moodle ───────────────────────────────────────────────────
    # Host $http_host: Moodle reçoit le vrai hostname → wwwroot dynamique correct
    # Pas de sub_filter localhost: Moodle génère directement des URLs avec le bon host
    location /moodle/ {
        proxy_pass http://moodle/;
        proxy_set_header Host $http_host;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 300;
        client_max_body_size 200M;
        sub_filter '</body>' $back_btn;
        sub_filter_once on;
    }

    # ── Kolibri ──────────────────────────────────────────────────
    location /kolibri/ {
        proxy_pass http://kolibri/kolibri/;
        include /etc/nginx/proxy_params;
        proxy_set_header Accept-Encoding "";
        proxy_buffering off;
        sub_filter '</body>' $back_btn;
        sub_filter_once on;
    }

    # ── Koha OPAC (public) ───────────────────────────────────────
    location /biblio/ {
        proxy_pass http://koha_opac/;
        include /etc/nginx/proxy_params;
        proxy_set_header Accept-Encoding "";
        sub_filter '</body>' $back_btn;
        sub_filter_once on;
    }

    # ── Koha Staff (admin, réseau local seulement) ───────────────
    location /biblio-admin/ {
        proxy_pass http://koha_staff/;
        include /etc/nginx/proxy_params;
        proxy_set_header Accept-Encoding "";
        sub_filter '</body>' $back_btn;
        sub_filter_once on;
        allow 192.168.50.0/24;
        allow 192.168.0.0/24;
        allow 127.0.0.1;
        deny all;
    }

    # ── Koha OPAC CGI sans préfixe (liens absolus générés par Koha après login/clic) ──
    # proxy_redirect: opac-changelanguage.pl redirige vers / → on corrige vers /biblio/
    location ~ ^/cgi-bin/koha/opac {
        proxy_pass http://koha_opac;
        include /etc/nginx/proxy_params;
        proxy_set_header Accept-Encoding "";
        proxy_redirect ~^/$ /biblio/;
        sub_filter '</body>' $back_btn;
        sub_filter_once on;
    }

    # ── Koha Staff CGI sans préfixe ────
    location /cgi-bin/koha/ {
        proxy_pass http://koha_staff/cgi-bin/koha/;
        include /etc/nginx/proxy_params;
        proxy_set_header Accept-Encoding "";
        sub_filter '</body>' $back_btn;
        sub_filter_once on;
        allow 192.168.50.0/24;
        allow 192.168.0.0/24;
        allow 127.0.0.1;
        deny all;
    }

    # ── Koha static assets (CSS/JS partagés OPAC+staff) ──────────
    # Les templates Koha génèrent des liens absolus /intranet-tmpl/ et /opac-tmpl/
    # sans préfixe /biblio-admin/ — nginx doit les proxifier vers le bon upstream
    location /intranet-tmpl/ {
        proxy_pass http://koha_staff/intranet-tmpl/;
        include /etc/nginx/proxy_params;
        allow 192.168.50.0/24;
        allow 192.168.0.0/24;
        allow 127.0.0.1;
        deny all;
        expires 1h;
    }

    location /opac-tmpl/ {
        proxy_pass http://koha_opac/opac-tmpl/;
        include /etc/nginx/proxy_params;
        expires 1h;
    }

    # ── PMB (gestion bibliothèque) ───────────────────────────────
    # proxy_pass sans chemin : l'URI originale (/pmb/xxx) est transmise telle quelle
    # Apache reçoit /pmb/xxx → sert /var/www/html/pmb/xxx ✓
    location /pmb/ {
        resolver 127.0.0.11 valid=10s;
        set $pmb http://edubox-pmb;
        proxy_pass $pmb;
        include /etc/nginx/proxy_params;
        proxy_set_header Accept-Encoding "";
        sub_filter '</body>' $back_btn;
        sub_filter_once on;
    }

    # ── SLiMS (gestion bibliothèque) ─────────────────────────────
    location /slims/ {
        resolver 127.0.0.11 valid=10s;
        set $slims http://edubox-slims;
        proxy_pass $slims;
        include /etc/nginx/proxy_params;
        proxy_set_header Accept-Encoding "";
        sub_filter '</body>' $back_btn;
        sub_filter_once on;
    }

    # ── Kiwix / Wikipedia ES ─────────────────────────────────────
    # Fix mobile: injecter CSS pour que l'iframe occupe tout l'écran (100dvh)
    location = /wiki/viewer {
        proxy_pass http://kiwix/wiki/viewer;
        include /etc/nginx/proxy_params;
        proxy_set_header Accept-Encoding "";
        sub_filter '</head>' '<style>#content_iframe{height:calc(100dvh - 50px)!important;}</style></head>';
        sub_filter_once on;
    }
    location /wiki/ {
        proxy_pass http://kiwix/wiki/;
        include /etc/nginx/proxy_params;
    }

    # ── Dashboard healthcheck ─────────────────────────────────────
    location /status/ {
        proxy_pass http://healthcheck/;
        include /etc/nginx/proxy_params;
    }
}

# ── Virtual hosts par sous-domaine ───────────────────────────────
server {
    listen 80;
    server_name moodle.edubox.local;
    location / {
        proxy_pass http://moodle/;
        include /etc/nginx/proxy_params;
        client_max_body_size 200M;
    }
}

server {
    listen 80;
    server_name kolibri.edubox.local;
    location / {
        proxy_pass http://kolibri/;
        include /etc/nginx/proxy_params;
        proxy_buffering off;
    }
}

server {
    listen 80;
    server_name biblio.edubox.local;
    location / {
        proxy_pass http://koha_opac/;
        include /etc/nginx/proxy_params;
    }
}

# ── Digistorm — port 3000 (pas de sous-chemin possible) ──────────
# Socket.IO requiert le proxy WebSocket
server {
    listen 3000;
    server_name _;

    location / {
        resolver 127.0.0.11 valid=10s;
        set $digistorm_upstream http://edubox-digistorm:3000;
        proxy_pass $digistorm_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        include /etc/nginx/proxy_params;
        proxy_set_header Accept-Encoding "";
        sub_filter '</body>' $back_btn;
        sub_filter_once on;
    }
}
