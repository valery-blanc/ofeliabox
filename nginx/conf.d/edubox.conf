# EduBox — Nginx reverse proxy + portail captif

upstream moodle      { server edubox-moodle:8080; }
upstream kolibri     { server edubox-kolibri:8080; }
upstream koha_opac   { server edubox-koha:8080; }
upstream koha_staff  { server edubox-koha:8081; }
upstream healthcheck { server edubox-healthcheck:8090; }
upstream kiwix       { server edubox-kiwix:8080; }
# Upstreams pour services optionnels — résolus dynamiquement via DNS Docker
# (évite l'erreur "host not found" si le container n'est pas encore démarré)
# resolver 127.0.0.11 = DNS interne Docker Compose

# Bouton icône maison injecté dans toutes les apps via sub_filter
# Défini comme map (http context) pour être disponible dans tous les server blocks
map $host $back_btn {
    default '<a id="ofelia-back" href="/" title="Portail" style="position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;background:#1e293b;color:#38bdf8;border:1px solid #334155;width:38px;height:38px;border-radius:50%;text-decoration:none;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.5);opacity:.92;display:flex;align-items:center;justify-content:center">&#127968;</a></body>';
}

# ── HTTP — portail + captive portal detection ─────────────────
server {
    listen 80 default_server;
    server_name ofelia ofelia.local libofelia _;

    # ── Captive portal detection ──────────────────────────────────
    # Android — retourner 204 pour éviter le popup "pas d'internet"
    location = /generate_204   { return 204; }
    location = /gen_204        { return 204; }

    # iOS / macOS
    location = /hotspot-detect.html {
        return 200 '<HTML><HEAD><TITLE>Success</TITLE></HEAD><BODY>Success</BODY></HTML>';
        add_header Content-Type text/html;
    }
    location = /library/test/success.html {
        return 200 '<HTML><HEAD><TITLE>Success</TITLE></HEAD><BODY>Success</BODY></HTML>';
        add_header Content-Type text/html;
    }

    # Windows
    location = /connecttest.txt { return 302 http://edubox.local/; }
    location = /ncsi.txt {
        return 200 'Microsoft NCSI';
        add_header Content-Type text/plain;
    }
    location = /redirect {
        return 302 http://edubox.local/;
    }

    include /etc/nginx/conf.d/ofelia-locations.inc;
}

# ── HTTPS — portail + applications (certificat auto-signé) ────
# Le certificat est généré par bootstrap.sh dans /opt/edubox/ssl/
# HTTP reste fonctionnel (captive portal detection nécessite HTTP)
server {
    listen 443 ssl;
    server_name ofelia ofelia.local _;

    ssl_certificate     /etc/nginx/ssl/ofelia.crt;
    ssl_certificate_key /etc/nginx/ssl/ofelia.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:1m;
    ssl_session_timeout 1h;

    include /etc/nginx/conf.d/ofelia-locations.inc;
}

# ── Virtual hosts par sous-domaine ───────────────────────────────
server {
    listen 80;
    server_name moodle.edubox.local;
    location / {
        proxy_pass http://moodle/;
        include /etc/nginx/proxy_params;
        client_max_body_size 200M;
    }
}

server {
    listen 80;
    server_name kolibri.edubox.local;
    location / {
        proxy_pass http://kolibri/;
        include /etc/nginx/proxy_params;
        proxy_buffering off;
    }
}

server {
    listen 80;
    server_name biblio.edubox.local;
    location / {
        proxy_pass http://koha_opac/;
        include /etc/nginx/proxy_params;
    }
}

# ── Digistorm — port 3000 (pas de sous-chemin possible) ──────────
# Socket.IO requiert le proxy WebSocket
server {
    listen 3000;
    server_name _;

    location / {
        resolver 127.0.0.11 valid=10s;
        set $digistorm_upstream http://edubox-digistorm:3000;
        proxy_pass $digistorm_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        include /etc/nginx/proxy_params;
        proxy_set_header Accept-Encoding "";
        sub_filter '</body>' $back_btn;
        sub_filter_once on;
    }
}
