<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>OFELIA — Serveur éducatif</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --burgundy:      #6B2138;
  --burgundy-dark: #4E1829;
  --orange:        #ED7538;
  --orange-light:  #FDE9D9;
  --amber:         #F3B84C;
  --amber-light:   #FDF3DC;
  --sky:           #B7D9FF;
  --sky-light:     #EAF5FF;
  --blush:         #F4BABA;
  --blush-light:   #FEF2F2;
  --olive:         #D1C360;
  --olive-light:   #F8F5D6;
  --green:         #3D8C5A;
  --green-light:   #E8F5EE;
  --cream:         #F7F5F0;
  --dark:          #3D3530;
  --dark-soft:     #5C5550;
  --grey:          #9A9088;
  --grey-light:    #D4CEC8;
  --ok:            #3D8C5A;
  --fail:          #C0392B;
  --warn:          #C98E20;
  --shadow-sm:     0 2px 8px rgba(61,53,48,.07);
  --shadow-md:     0 4px 20px rgba(61,53,48,.13);
  --font-brand:    'Bricolage Grotesque', system-ui, sans-serif;
  --font-body:     'DM Sans', system-ui, sans-serif;
}
html { scroll-behavior: smooth; }
body {
  background: var(--burgundy-dark) url('/assets/bg.png') center top / cover no-repeat fixed;
  color: var(--dark);
  font-family: var(--font-body);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  -webkit-font-smoothing: antialiased;
}
a { text-decoration: none; color: inherit; }

/* ── Nav ── */
#top-nav {
  width: 100%;
  background: #fff;
  border-bottom: 1px solid #F0EDE8;
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 72px;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 1px 8px rgba(61,53,48,.06);
  gap: 16px;
}
#nav-brand { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
#nav-logo { height: 36px; object-fit: contain; }
#nav-tagline { font-family: var(--font-brand); font-size: 11px; font-weight: 500; color: var(--grey); letter-spacing: .01em; }

/* ── Lang bar ── */
.lang-bar { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.lang-btn {
  background: transparent;
  color: var(--grey);
  border: 1px solid var(--grey-light);
  padding: 4px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  transition: all .15s;
  letter-spacing: .04em;
}
.lang-btn.active, .lang-btn:hover {
  background: var(--burgundy);
  color: #fff;
  border-color: var(--burgundy);
}

/* ── Grid ── */
#app-grid {
  width: 100%;
  max-width: 960px;
  padding: 40px 24px 60px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

/* ── App card ── */
.app-card {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  border-radius: 12px;
  padding: 28px 22px;
  border: 2px solid transparent;
  box-shadow: var(--shadow-sm);
  transition: transform .18s ease, box-shadow .18s ease;
  cursor: pointer;
  min-height: 180px;
  text-decoration: none;
}
.app-card:hover { transform: translateY(-4px) scale(1.01); box-shadow: var(--shadow-md); }

.card-letter {
  width: 48px; height: 48px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-brand);
  font-size: 22px; font-weight: 800;
  margin-bottom: 16px;
  flex-shrink: 0;
}
.card-name { font-family: var(--font-brand); font-size: 17px; font-weight: 700; margin-bottom: 6px; line-height: 1.2; }
.card-desc { font-size: 12.5px; line-height: 1.55; flex: 1; }

/* ── Status badge ── */
.status-badge { display: flex; align-items: center; gap: 5px; margin-top: auto; padding-top: 10px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.status-label { font-size: 11px; font-weight: 600; }

/* light-bg cards → dark text */
.card-light .card-name  { color: var(--dark); }
.card-light .card-desc  { color: rgba(61,53,48,.72); }
.card-light .status-label { color: var(--grey); }
.card-light .card-letter  { background: rgba(255,255,255,.45); color: var(--dark); }
/* dark-bg cards → white text */
.card-dark .card-name   { color: #fff; }
.card-dark .card-desc   { color: rgba(255,255,255,.78); }
.card-dark .status-label { color: rgba(255,255,255,.75); }
.card-dark .card-letter  { background: rgba(255,255,255,.18); color: #fff; }

/* ── Credentials card ── */
.cred-card {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  background: #fff;
  border-radius: 12px;
  padding: 28px 22px;
  border: 2px dashed var(--grey-light);
  box-shadow: none;
  transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
  cursor: pointer;
  min-height: 180px;
  text-decoration: none;
}
.cred-card:hover { transform: translateY(-3px); border-color: var(--grey); box-shadow: var(--shadow-sm); }
.cred-card .card-letter { background: #F0EDE8; font-size: 22px; color: var(--dark-soft); }
.cred-card .card-name  { font-family: var(--font-brand); font-size: 17px; font-weight: 700; color: var(--grey); margin-bottom: 6px; }
.cred-card .card-desc  { font-size: 12.5px; color: var(--grey); line-height: 1.55; }

/* ── Footer ── */
#footer {
  width: 100%;
  background: var(--burgundy);
  padding: 24px 40px;
  margin-top: auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
#footer-inner { max-width: 960px; width: 100%; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
#footer-logo { height: 28px; object-fit: contain; filter: brightness(0) invert(1); opacity: .8; }
#footer-text { font-size: 12px; color: rgba(255,255,255,.4); }
</style>
</head>
<body>

<nav id="top-nav">
  <div id="nav-brand">
    <img id="nav-logo" src="/assets/logo.png" alt="OFELIA" onerror="this.style.display='none';document.getElementById('nav-logo-text').style.display='block'">
    <span id="nav-logo-text" style="display:none;font-family:var(--font-brand);font-size:24px;font-weight:800;color:var(--dark)">OFeLia</span>
    <span id="nav-tagline"></span>
  </div>
  <div class="lang-bar" id="nav-lang"></div>
</nav>

<main id="app-grid"></main>

<footer id="footer">
  <div id="footer-inner">
    <img id="footer-logo" src="/assets/logo.png" alt="OFELIA" onerror="this.style.display='none'">
    <span id="footer-text"></span>
    <div class="lang-bar" id="footer-lang"></div>
  </div>
</footer>

<script>
const LANG_KEY = 'ofelia-lang';
const LANGS = ['fr','en','es','pt','it','de'];

const i18n = {
  fr: { tagline:'Bibliothèque éducative hors-ligne', credentials:'Identifiants', credDesc:'Logins et mots de passe', footer:'Ofelia — Serveur éducatif local', online:'En ligne', offline:'Hors ligne', checking:'Vérification…',
        moodle:'Cours en ligne, exercices, quiz', kolibri:'Khan Academy, vidéos éducatives', koha:'Gestion de bibliothèque', pmb:'Gestion de bibliothèque', slims:'Gestion de bibliothèque', digistorm:'Sondages, remue-méninges et quiz interactifs', wikipedia:"L'encyclopédie libre en espagnol", wikisource:'Bibliothèque libre et collaborative', gutenberg:'Livres libres en espagnol', calibre:'Bibliothèque domaine public en espagnol' },
  en: { tagline:'Offline educational library', credentials:'Credentials', credDesc:'Logins and passwords', footer:'Ofelia — Local educational server', online:'Online', offline:'Offline', checking:'Checking…',
        moodle:'Online courses, exercises, quizzes', kolibri:'Khan Academy, educational videos', koha:'Library management', pmb:'Library management', slims:'Library management', digistorm:'Polls, brainstorms and interactive quizzes', wikipedia:'The free encyclopedia in Spanish', wikisource:'Free collaborative library', gutenberg:'Free books in Spanish', calibre:'Spanish public domain library' },
  es: { tagline:'Biblioteca educativa sin conexión', credentials:'Credenciales', credDesc:'Logins y contraseñas', footer:'Ofelia — Servidor educativo local', online:'En línea', offline:'Sin conexión', checking:'Comprobando…',
        moodle:'Cursos en línea, ejercicios, cuestionarios', kolibri:'Khan Academy, videos educativos', koha:'Gestión de biblioteca', pmb:'Gestión de biblioteca', slims:'Gestión de biblioteca', digistorm:'Encuestas, lluvias de ideas y cuestionarios', wikipedia:'La enciclopedia libre en español', wikisource:'Biblioteca libre y colaborativa', gutenberg:'Libros libres en español', calibre:'Biblioteca dominio público en español' },
  pt: { tagline:'Biblioteca educativa offline', credentials:'Credenciais', credDesc:'Logins e senhas', footer:'Ofelia — Servidor educativo local', online:'Online', offline:'Offline', checking:'Verificando…',
        moodle:'Cursos online, exercícios, questionários', kolibri:'Khan Academy, vídeos educativos', koha:'Gestão de biblioteca', pmb:'Gestão de biblioteca', slims:'Gestão de biblioteca', digistorm:'Sondagens, brainstorms e questionários', wikipedia:'A enciclopédia livre em espanhol', wikisource:'Biblioteca livre e colaborativa', gutenberg:'Livros livres em espanhol', calibre:'Biblioteca domínio público em espanhol' },
  it: { tagline:'Biblioteca educativa offline', credentials:'Credenziali', credDesc:'Login e password', footer:'Ofelia — Server educativo locale', online:'Online', offline:'Offline', checking:'Verifica…',
        moodle:'Corsi online, esercizi, quiz', kolibri:'Khan Academy, video educativi', koha:'Gestione biblioteca', pmb:'Gestione biblioteca', slims:'Gestione biblioteca', digistorm:'Sondaggi, brainstorm e quiz interattivi', wikipedia:"L'enciclopedia libera in spagnolo", wikisource:'Biblioteca libera e collaborativa', gutenberg:'Libri liberi in spagnolo', calibre:'Biblioteca di pubblico dominio in spagnolo' },
  de: { tagline:'Offline-Bildungsbibliothek', credentials:'Zugangsdaten', credDesc:'Logins und Passwörter', footer:'Ofelia — Lokaler Bildungsserver', online:'Online', offline:'Offline', checking:'Prüfung…',
        moodle:'Online-Kurse, Übungen, Quiz', kolibri:'Khan Academy, Lernvideos', koha:'Bibliotheksverwaltung', pmb:'Bibliotheksverwaltung', slims:'Bibliotheksverwaltung', digistorm:'Umfragen, Brainstorms und Quiz', wikipedia:'Die freie Enzyklopädie auf Spanisch', wikisource:'Freie kollaborative Bibliothek', gutenberg:'Freie Bücher auf Spanisch', calibre:'Spanische Gemeinfreiheitsbibliothek' },
};

const LIGHT_COLORS = new Set(['amber','sky','olive','blush']);
const COLOR_MAP = {
  amber:    'var(--amber)',
  orange:   'var(--orange)',
  burgundy: 'var(--burgundy)',
  sky:      'var(--sky)',
  olive:    'var(--olive)',
  blush:    'var(--blush)',
  green:    'var(--green)',
};

const HREF_SUFFIX = {
  fr: ['?lang=fr','','?language=en','?lang=fr_FR','?select_lang=en_US'],
  en: ['?lang=en','','?language=en','?lang=en_US','?select_lang=en_US'],
  es: ['?lang=es','','?language=es-ES','?lang=es_ES','?select_lang=es_ES'],
  pt: ['?lang=pt','','?language=en','?lang=pt_BR','?select_lang=pt_BR'],
  it: ['?lang=it','','?language=en','?lang=it_IT','?select_lang=en_US'],
  de: ['?lang=de','','?language=en','?lang=de_DE','?select_lang=de_DE'],
};

const APPS = [
  { id:'moodle',     name:'Moodle',     color:'amber',    hrefFn: s => `/moodle/my/index.php${s[0]}` },
  { id:'kolibri',    name:'Kolibri',    color:'orange',   hrefFn: s => `/kolibri/${s[1]}` },
  { id:'koha',       name:'Koha',       color:'burgundy', hrefFn: s => `/cgi-bin/koha/opac-changelanguage.pl${s[2]}` },
  { id:'pmb',        name:'PMB',        color:'sky',      hrefFn: s => `/pmb/index.php${s[3]}` },
  { id:'slims',      name:'SLiMS',      color:'olive',    hrefFn: s => `/slims/index.php${s[4]}` },
  { id:'digistorm',  name:'Digistorm',  color:'blush',    hrefFn: () => `http://${location.hostname}:3000/` },
  { id:'wikipedia',  name:'Wikipedia',  color:'orange',   hrefFn: () => '/wiki/viewer#wikipedia_es/Wikipedia%3AOffline' },
  { id:'wikisource', name:'Wikisource', color:'burgundy', hrefFn: () => '/wiki/viewer#wikisource_es/Portada' },
  { id:'gutenberg',  name:'Gutenberg',  color:'green',    hrefFn: () => '/wiki/viewer#gutenberg_es/' },
  { id:'calibre',    name:'Calibre',    color:'amber',    hrefFn: () => '/calibre/' },
];

let currentLang = localStorage.getItem(LANG_KEY) || 'fr';
if (!i18n[currentLang]) currentLang = 'fr';

function makeCard(app, t) {
  const s = HREF_SUFFIX[currentLang] || HREF_SUFFIX.fr;
  const isLight = LIGHT_COLORS.has(app.color);
  const bg = COLOR_MAP[app.color] || 'var(--burgundy)';
  const a = document.createElement('a');
  a.className = `app-card ${isLight ? 'card-light' : 'card-dark'}`;
  a.id = `card-${app.id}`;
  a.href = app.hrefFn(s);
  a.style.background = bg;
  a.innerHTML = `
    <div class="card-letter">${app.name[0]}</div>
    <div class="card-name">${app.name}</div>
    <div class="card-desc">${t[app.id] || ''}</div>
    <div class="status-badge">
      <div class="status-dot" id="dot-${app.id}"></div>
      <span class="status-label" id="status-${app.id}">${t.checking}</span>
    </div>`;
  return a;
}

function makeCredCard(t) {
  const a = document.createElement('a');
  a.className = 'cred-card';
  a.href = '/credentials.html';
  a.innerHTML = `
    <div class="card-letter">🔑</div>
    <div class="card-name">${t.credentials}</div>
    <div class="card-desc">${t.credDesc}</div>`;
  return a;
}

function renderGrid() {
  const grid = document.getElementById('app-grid');
  const t = i18n[currentLang];
  grid.innerHTML = '';
  APPS.forEach(app => grid.appendChild(makeCard(app, t)));
  grid.appendChild(makeCredCard(t));
}

function renderLangBar(containerId) {
  const bar = document.getElementById(containerId);
  bar.innerHTML = '';
  LANGS.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn' + (l === currentLang ? ' active' : '');
    btn.textContent = l.toUpperCase();
    btn.onclick = () => setLang(l);
    bar.appendChild(btn);
  });
}

function setLang(l) {
  currentLang = l;
  localStorage.setItem(LANG_KEY, l);
  render();
  applyWizardState();
}

function render() {
  const t = i18n[currentLang];
  document.documentElement.lang = currentLang;
  document.getElementById('nav-tagline').textContent = t.tagline;
  document.getElementById('footer-text').textContent = t.footer;
  renderGrid();
  renderLangBar('nav-lang');
  renderLangBar('footer-lang');
}

function setStatus(id, state, t) {
  const dot = document.getElementById(`dot-${id}`);
  const lbl = document.getElementById(`status-${id}`);
  if (!dot || !lbl) return;
  const card = document.getElementById(`card-${id}`);
  const onDark = card && card.classList.contains('card-dark');
  if (state === 'ok') {
    dot.style.background = onDark ? 'rgba(255,255,255,.9)' : 'var(--ok)';
    lbl.textContent = t.online;
  } else if (state === 'fail') {
    dot.style.background = onDark ? 'rgba(255,255,255,.5)' : 'var(--fail)';
    lbl.textContent = t.offline;
  } else {
    dot.style.background = onDark ? 'rgba(255,255,255,.4)' : 'var(--warn)';
    lbl.textContent = t.checking;
  }
}

function checkStatus() {
  const t = i18n[currentLang];
  fetch('/api/status')
    .then(r => r.json())
    .then(data => {
      APPS.forEach(app => setStatus(app.id, data[app.id] || 'fail', t));
    })
    .catch(() => {
      APPS.forEach(app => setStatus(app.id, 'fail', t));
    });
}

function applyWizardState() {
  fetch('/wizard-state.json')
    .then(r => r.json())
    .then(state => {
      if (!state.apps && !state.zims) return;
      const apps = new Set(state.apps || []);
      const zims = new Set(state.zims || []);

      const hide = id => { const el = document.getElementById(`card-${id}`); if (el) el.style.display = 'none'; };

      ['moodle','kolibri','koha','pmb','slims','digistorm'].forEach(id => { if (!apps.has(id)) hide(id); });

      const hasWiki = zims.has('wikipedia_es') || zims.has('wikipedia_fr');
      const hasWikisource = zims.has('wikisource_es') || zims.has('wikisource_fr');
      const hasGutenberg = zims.has('gutenberg_es') || zims.has('gutenberg_fr') || zims.has('gutenberg_mul');
      if (!hasWiki) hide('wikipedia');
      if (!hasWikisource) hide('wikisource');
      if (!hasGutenberg) hide('gutenberg');
      if (!state.calibre) hide('calibre');
    })
    .catch(() => {});
}

render();
applyWizardState();
checkStatus();
setInterval(checkStatus, 30000);
</script>
</body>
</html>
